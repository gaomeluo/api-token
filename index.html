let ALL = [];
let ALL_TAGS = [];
let currentType = "free";
let currentTag = null;
let compareSet = new Set();
let currentSort = "rating";

async function load() {
  try {
    const [tRes, tagRes] = await Promise.all([
      fetch(API_BASE + "/api/tokens"), fetch(API_BASE + "/api/tags")
    ]);
    if (!tRes.ok) throw new Error("api fail");
    ALL = await tRes.json();
    ALL_TAGS = await tagRes.json();
  } catch (e) {
    ALL = FALLBACK;
    ALL_TAGS = [...new Set(FALLBACK.flatMap(t => t.tags))].sort();
    console.warn("使用内置示例数据（未连接到后端）");
  }
  renderTags();
  render();
}

function renderTags() {
  const box = document.getElementById("tags");
  box.innerHTML = "";
  const mk = (label, val) => {
    const el = document.createElement("div");
    el.className = "tag" + (currentTag === val ? " active" : "");
    el.textContent = label;
    el.onclick = () => { currentTag = (currentTag === val ? null : val); renderTags(); render(); };
    return el;
  };
  box.appendChild(mk("全部", null));
  ALL_TAGS.forEach(t => box.appendChild(mk(t, t)));
}

function filtered() {
  let list = ALL.filter(t => t.type === currentType);
  if (currentTag) list = list.filter(t => (t.tags || []).includes(currentTag));
  const s = currentSort;
  if (s === "rating") list.sort((a,b)=>b.rating-a.rating);
  else if (s === "valueScore") list.sort((a,b)=>b.valueScore-a.valueScore);
  else if (s === "addedAt") list.sort((a,b)=>(b.addedAt||"").localeCompare(a.addedAt||""));
  else if (s === "priceAsc") list.sort((a,b)=>((a.type==="free"?0:1)-(b.type==="free"?0:1)) || ((a.priceValue||0)-(b.priceValue||0)));
  else list.sort((a,b)=>b.rating-a.rating);
  return list;
}

function stars(n) { return "★".repeat(Math.round(n)) + "☆".repeat(5 - Math.round(n)); }

function render() {
  const list = filtered();
  const grid = document.getElementById("grid");
  const meta = document.getElementById("listMeta");
  const typeLabel = currentType === "free" ? "免费榜（按评分排序）" : "付费榜（按性价比排序）";
  meta.textContent = `共 ${list.length} 个 · ${typeLabel}${currentTag ? " · 标签：" + currentTag : ""}`;
  grid.innerHTML = "";
  list.forEach((t, i) => {
    const card = document.createElement("div");
    card.className = "card";
    const checked = compareSet.has(t.id) ? "checked" : "";
    card.innerHTML = `
      <div class="rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i + 1}</div>
      <h3>${t.name}</h3>
      <div class="badges topright">
        <span class="badge ${t.type}">${t.type === "free" ? "免费" : "付费"}</span>
      </div>
      <div class="stars">${stars(t.rating)} <span class="hint">${t.rating}</span></div>
      <div class="value-row">性价比 ${t.valueScore}/5
        <div class="value-bar"><i style="width:${t.valueScore*20}%"></i></div>
      </div>
      <div class="chips">${(t.tags||[]).map(x=>`<span class="chip">${x}</span>`).join("")}</div>
      <div class="desc">${t.description||""}</div>
      <div class="qlist">
        <b style="color:${t.type==='free'?'var(--accent2)':'var(--gold)'}">${t.type==='free'?'🆓 免费额度：':'💎 付费详情：'}</b>
        <ul>${(t.type==='free'?(t.freeQuotaList||[]):(t.priceList||[])).map(x=>`<li>${x}</li>`).join('')}</ul>
      </div>
      <div class="card-actions">
        <button class="btn small" onclick="openDetail('${t.id}')">详情</button>
        <a class="btn small ghost" href="${t.url}" target="_blank">前往 ↗</a>
        <label class="check"><input type="checkbox" ${checked} onchange="toggleCompare('${t.id}', this.checked)"/> 对比</label>
      </div>`;
    grid.appendChild(card);
  });
}

function switchType(type) {
  currentType = type;
  currentSort = type === "paid" ? "valueScore" : "rating";
  const sel = document.getElementById("sortSel"); if (sel) sel.value = currentSort;
  document.querySelectorAll(".tab").forEach(el => el.classList.toggle("active", el.dataset.type === type));
  render();
}
function applySort(){ currentSort = document.getElementById("sortSel").value; render(); }

function openDetail(id) {
  const t = ALL.find(x => x.id === id);
  if (!t) return;
  const m = document.getElementById("detailModal");
  m.innerHTML = `<span class="close" onclick="closeDetail()">✕</span>
    <h2>${t.name}</h2>
    <div class="badges"><span class="badge ${t.type}">${t.type==="free"?"免费":"付费"}</span></div>
    <p>${t.description||""}</p>
    ${t.type==="free"
      ? `<div class="qlist"><b style="color:var(--accent2)">🆓 免费额度（按模型）：</b><ul>${(t.freeQuotaList||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>`
      : `<div class="qlist"><b style="color:var(--gold)">💎 付费详情（按模型）：</b><ul>${(t.priceList||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>`}
    <p><b>⚠️ 限制：</b>${t.limits||"—"}</p>
    <p><b>评分：</b><span class="stars">${stars(t.rating)}</span> ${t.rating}/5 ｜ <b>性价比：</b>${t.valueScore}/5</p>
    <p><b>擅长领域标签：</b>${(t.tags||[]).map(x=>`<span class="chip">${x}</span>`).join(" ")}</p>
    <p><b>擅长领域详解：</b>${t.expertise||"—"}</p>
    <p><b>核心优势：</b>${t.strengths||"—"}</p>
    <p style="margin-top:14px;"><a class="btn" href="${t.url}" target="_blank">前往官网 ↗</a></p>`;
  document.getElementById("detailOverlay").classList.add("show");
}
function closeDetail() { document.getElementById("detailOverlay").classList.remove("show"); }

function toggleCompare(id, on) {
  if (on) compareSet.add(id); else compareSet.delete(id);
  const bar = document.getElementById("compareBar");
  const names = [...compareSet].map(i => (ALL.find(x=>x.id===i)||{}).name).filter(Boolean);
  document.getElementById("compareNames").textContent = names.length ? "已选：" + names.join("、") : "";
  bar.classList.toggle("show", compareSet.size > 0);
}
function clearCompare() {
  compareSet.clear();
  document.getElementById("compareBar").classList.remove("show");
  render();
}
function openCompare() {
  if (compareSet.size < 2) { alert("请至少选择 2 个进行对比"); return; }
  const items = [...compareSet].map(i => ALL.find(x => x.id === i)).filter(Boolean);
  const fields = [["类型","type"],["评分","rating"],["性价比","valueScore"],
    ["免费额度(按模型)","freeQuotaList"],["付费详情(按模型)","priceList"],["限制","limits"],
    ["擅长领域标签","tags"],["擅长领域详解","expertise"],["核心优势","strengths"],["官网","url"]];
  let html = `<span class="close" onclick="closeCompare()">✕</span><h2>🔍 API 对比（${items.length} 项）</h2>
    <table class="cmp"><tr><th>维度</th>${items.map(i=>`<th>${i.name}</th>`).join("")}</tr>`;
  fields.forEach(([label, key]) => {
    html += `<tr><th>${label}</th>`;
    items.forEach(i => {
      let v = i[key];
      if (Array.isArray(v)) v = '<ul class="cmplist">'+v.map(x=>`<li>${x}</li>`).join('')+'</ul>';
      else if (key === "tags") v = (v||[]).map(x=>`<span class="chip">${x}</span>`).join(" ");
      else if (key === "url") v = `<a href="${v}" target="_blank">前往 ↗</a>`;
      else if (key === "type") v = v === "free" ? "免费" : "付费";
      html += `<td>${v ?? "—"}</td>`;
    });
    html += `</tr>`;
  });
  html += `</table>`;
  document.getElementById("cmpModal").innerHTML = html;
  document.getElementById("cmpOverlay").classList.add("show");
}
function closeCompare() { document.getElementById("cmpOverlay").classList.remove("show"); }

function showNews(){ document.getElementById("newsOverlay").classList.add("show"); loadNews(false); }
function closeNews(){ document.getElementById("newsOverlay").classList.remove("show"); }
function fmtDate(s){ if(!s) return "—"; try { return new Date(s).toLocaleString("zh-CN"); } catch(e){ return s; } }
async function loadNews(refresh){
  const box = document.getElementById("newsList");
  box.innerHTML = '<span class="hint">加载中…</span>';
  try {
    const r = await fetch(API_BASE + "/api/news" + (refresh ? "?refresh=true" : ""));
    const d = await r.json();
    if (!d.items || !d.items.length) { box.innerHTML = '<span class="hint">暂无新闻</span>'; return; }
    box.innerHTML = d.items.map(n => `<div class="news-item">
      <div class="news-title"><a href="${n.link}" target="_blank">${n.title}</a></div>
      <div class="news-meta"><span>${n.source||""}</span> · <span>${fmtDate(n.pubDate)}</span>${d.seed?' · 示例数据':''}</div>
    </div>`).join("");
  } catch(e){ box.innerHTML = '<span class="hint">加载失败（预览模式无后端）</span>'; }
}

load();
</script>
</body>
</html>
