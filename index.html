    const n = ALL.filter(t=>{
      if(t.category===c) return true;
      const mp={"文本模型":["对话","长文本","翻译","中文"],"编程模型":["写代码"],"视频模型":["视频","视频生成","数字人","3D"],"音频模型":["语音","语音合成","TTS","语音识别","ASR","语音克隆","音乐"],"图片模型":["画图","图像生成","图像编辑","品牌设计","游戏资产","商用"],"推理模型":["推理","搜索","开源","高速","本地","embeddings"]};
      return (mp[c]||[]).some(k=>(t.tags||[]).includes(k));
    }).length;
    h += `<a href="#" class="${c===curCat?'active':''}" data-cat="${c}" data-tool="" onclick="pickCat('${c}');pickTool(null);return false"><span class="si">${CI[c]}</span><span>${c}</span><span class="n">${n}</span></a>`;
  }
  $("sideNav").innerHTML = h;

  let th=`<a href="#" class="small ${curTool==='AI智能体'?'active':''}" data-tool="AI智能体" data-cat="" onclick="pickTool('AI智能体');pickCat(null);return false"><span class="si">🤖</span><span>AI智能体</span><span class="n">30</span></a>`;
  th+=`<a href="#" class="small ${curTool==='AI编程工具'?'active':''}" data-tool="AI编程工具" data-cat="" onclick="pickTool('AI编程工具');pickCat(null);return false"><span class="si">💻</span><span>AI编程工具</span><span class="n">30</span></a>`;
  $("toolNav").innerHTML = th;
}

function pickCat(c){ curCat=(curCat===c)?null:c; curTool=null; buildSidebar(); render(); }
function pickTool(t){ curTool=(curTool===t)?null:t; curCat=null; buildSidebar(); render(); }

function switchVM(t){ curType=t; document.querySelectorAll(".tbar-tab").forEach(e=>e.classList.toggle("active",e.dataset.type===t)); render(); }

function filtered(){
  let list = ALL.filter(t=>t.type===curType);
  if(curCat){
    const mp={"文本模型":["对话","长文本","翻译","中文"],"编程模型":["写代码"],"视频模型":["视频","视频生成","数字人","3D"],"音频模型":["语音","语音合成","TTS","语音识别","ASR","语音克隆","音乐"],"图片模型":["画图","图像生成","图像编辑","品牌设计","游戏资产","商用"],"推理模型":["推理","搜索","开源","高速","本地","embeddings"]};
    const kw=mp[curCat]||[];
    list = list.filter(t=>t.category===curCat||(t.tags||[]).some(tag=>kw.includes(tag)));
  }
  const q=(document.querySelector("#q")?document.querySelector("#q").value:"").trim().toLowerCase();
  if(q) list=list.filter(t=>(t.name||"").toLowerCase().includes(q)||(t.tags||[]).join(",").toLowerCase().includes(q));
  return list;
}
function getFav(u){ try{return `https://www.google.com/s2/favicons?domain=${new URL(u).hostname}&sz=64`;}catch(e){return"";} }

function render(){
  const fc=filtered();
  let h=`<section class="featured-wrap" id="ns" style="display:none">
    <div class="feat-img"><img id="fi" src="" alt="" onerror="this.style.display='none';document.getElementById('ff').style.display='flex'"/>
    <div class="feat-fb" id="ff"><span></span></div><div class="feat-dots" id="fd"></div></div>
    <div class="feat-text"><div class="ft-head"><div class="ft-tag">推荐 API Token</div><div class="ft-arrow"><button onclick="pv()">‹</button><button onclick="nx()">›</button></div></div><ul class="feat-list" id="fl"></ul></div></section>
    <div class="tbar"><div class="tbar-tabs">
      <div class="tbar-tab active" data-type="free" onclick="switchVM('free')">🆓 免费</div>
      <div class="tbar-tab" data-type="paid" onclick="switchVM('paid')">💎 付费</div></div>
    <span class="tbar-stat"><b style="color:var(--primary)">${ALL.length}</b> 个 API · ${curType==="free"?"免费榜":"付费榜"}</span>
    </div><div class="search-bar"><div class="search-box"><input id="q" placeholder="搜索 API Token（按名称/标签）" oninput="render()"/></div></div>`;

  if(curTool){
    const tools = TOOLS.filter(t=>t.c===curTool);
    h += `<div class="subtitle">${curTool} · ${tools.length} 个工具</div><div class="tool-grid">`;
    tools.forEach(t=>{
      h += `<div class="tcard"><div class="ti"><img src="${getFav(t.u)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><span class="fb" style="display:none">${t.n.charAt(0)}</span></div>
        <div class="tb"><b>${t.n}</b><div class="td">${t.d}</div><div class="tcat">${t.c}</div></div>
        <a class="btn btn-pri" href="${t.u}" target="_blank">官网</a></div>`;
    });
    h += `</div>`;
  } else {
    h += `<div class="subtitle">共 ${fc.length} 个${curCat?" · "+curCat:""} · ${curType==="free"?"免费":"付费"}</div><div class="grid">`;
    fc.forEach(t=>{
      const fl=t.type==="free"?(t.freeQuotaList&&t.freeQuotaList.length?t.freeQuotaList:t.freeQuota?[t.freeQuota]:[]):(t.priceList&&t.priceList.length?t.priceList:t.priceStandard?[t.priceStandard]:[]);
      h += `<div class="card"><div class="ci"><img src="${getFav(t.url||'')}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><span class="fb" style="display:none">${(t.name||"?").trim().charAt(0)}</span></div>
        <div class="cb"><div class="cn">${t.name}<span class="badge ${t.type}">${t.type==="free"?"免费":"付费"}</span>${t.brand?`<span class="badge vendor">${t.brand}</span>`:""}${t.country?`<span class="badge country">${t.country}</span>`:""}</div>
        <div class="ct">${(t.tags||[]).slice(0,5).map(x=>`<span class="chip">${x}</span>`).join("")}</div><div class="cd">${t.description||""}</div>
        ${fl.length?`<div class="ql"><b>${t.type==="free"?"🆓 免费额度":"💎 付费详情"}</b><ul>${fl.slice(0,2).map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}
        <div class="cf"><button class="btn btn-pri" onclick="det('${t.id}')">详情</button><a class="btn btn-ghost" href="${t.url}" target="_blank">前往 ↗</a></div></div></div>`;
    });
    h += `</div>`;
  }
  $("c").innerHTML = h;
  if(siteNews.length){ $("ns").style.display="flex"; rns(false); }
}

function det(id){
  const t=ALL.find(x=>x.id===id); if(!t) return;
  const fl=t.type==="free"?(t.freeQuotaList&&t.freeQuotaList.length?t.freeQuotaList:t.freeQuota?[t.freeQuota]:[]):(t.priceList&&t.priceList.length?t.priceList:t.priceStandard?[t.priceStandard]:[]);
  document.body.insertAdjacentHTML("beforeend",`<div style="position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;" onclick="if(event.target===this)this.remove()"><div style="background:#fff;border-radius:14px;max-width:620px;width:100%;max-height:86vh;overflow:auto;padding:22px 26px;"><span style="float:right;cursor:pointer;font-size:20px;color:var(--muted)" onclick="this.closest('[style*=fixed]').remove()">✕</span><h3 style="margin:0 0 12px">${t.name}</h3><div style="margin:6px 0">${t.brand?`<span class="badge vendor">${t.brand}</span>`:""}${t.country?`<span class="badge country">${t.country}</span>`:""}<span class="badge ${t.type}">${t.type==="free"?"免费":"付费"}</span></div><p style="color:var(--muted)">${t.description||""}</p>${fl.length?`<div class="ql"><b>${t.type==="free"?"🆓 免费额度":"💎 付费详情"}</b><ul>${fl.map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}<p><b>⚠️ 限制：</b>${t.limits||"—"}</p><p><b>评分：</b>${t.rating}/5 ｜ <b>性价比：</b>${t.valueScore}/5</p>${t.expertise?`<p><b>详解：</b>${t.expertise}</p>`:""}<p style="margin-top:14px;"><a class="btn btn-pri" href="${t.url}" target="_blank">前往官网 ↗</a></p></div></div>`);
}

// carousel
async function loadSiteNews(){
  try{siteNews=await(await fetch(API+"/api/site-news")).json();}catch(e){siteNews=[];return;}
  if(!siteNews.length) return;
  $("ns").style.display="flex";rns(false);
  newsTimer=setInterval(()=>{newsIdx=(newsIdx+1)%siteNews.length;rns(true);},5000);
}
function rns(a){
  if(!siteNews.length)return;const n=siteNews[newsIdx],i=$("fi"),f=$("ff");
  if(n.image){f.style.display="none";i.style.display="";if(a){i.classList.add("hiding");setTimeout(()=>{i.src=n.image;i.classList.remove("hiding");},350);}else i.src=n.image;}
  else{i.style.display="none";f.style.display="flex";f.querySelector("span").textContent=n.title;}
  $("fd").innerHTML=siteNews.map((_,x)=>`<span class="${x===newsIdx?'active':''}" onclick="gn(${x})"></span>`).join("");
  $("fl").innerHTML=siteNews.map((it,x)=>`<li class="${x===newsIdx?'on':''}" onclick="gn(${x})"><a href="${it.link}" target="_blank">${it.title}<span class="f-badge">推荐</span></a><div class="s">${it.summary||""}</div></li>`).join("");
}
function gn(x){newsIdx=x;clearInterval(newsTimer);rns(true);newsTimer=setInterval(()=>{newsIdx=(newsIdx+1)%siteNews.length;rns(true);},5000);}
function pv(){gn((newsIdx-1+siteNews.length)%siteNews.length);}
function nx(){gn((newsIdx+1)%siteNews.length);}

loadSiteNews();load();
</script>
</body>
</html>
