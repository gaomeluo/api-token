  $("tstat").innerHTML='<b style="color:var(--primary)">'+ALL.length+'</b> 个 API · '+(curCat||(curType==="free"?"免费榜":"付费榜"));
  $("sub").textContent="";
  if(!list.length){$("list").innerHTML='<div style="color:var(--muted);text-align:center;padding:40px">暂无</div>';return;}
  $("list").innerHTML='<div class="grid">'+list.map(t=>{
    let fl=t.type==="free"?(t.freeQuotaList&&t.freeQuotaList.length?t.freeQuotaList:t.freeQuota?[t.freeQuota]:[]):(t.priceList&&t.priceList.length?t.priceList:t.priceStandard?[t.priceStandard]:[]);
    return'<div class="card"><div class="ico"><img src="'+fav(t.url||"")+'" alt="" onerror="this.remove();this.parentElement.innerHTML=\'<span class=fb>'+(t.name||"?")[0]+'<\/span>\'"/></div><div class="cb"><div class="cn">'+t.name+'<span class="badge '+t.type+'">'+(t.type==="free"?"免费":"付费")+'</span>'+(t.brand?'<span class="badge vendor">'+t.brand+'</span>':'')+(t.country?'<span class="badge country">'+t.country+'</span>':'')+'</div><div class="ct">'+(t.tags||[]).slice(0,5).map(x=>'<span class="chip">'+x+'</span>').join("")+'</div><div class="cd">'+(t.description||"")+'</div>'+(fl.length?'<div class="ql"><b>'+(t.type==="free"?"🆓":"💎")+'</b><ul>'+fl.slice(0,2).map(x=>'<li>'+x+'</li>').join("")+'</ul></div>':"")+'<div class="cf"><button class="btn btn-pri" onclick="det(\''+t.id+'\')">详情</button><a class="btn btn-ghost" href="'+t.url+'" target="_blank">前往 ↗</a></div></div></div>';
  }).join("")+'</div>';
}

function det(id){
  let t=ALL.find(x=>x.id===id);if(!t)return;
  let fl=t.type==="free"?(t.freeQuotaList&&t.freeQuotaList.length?t.freeQuotaList:t.freeQuota?[t.freeQuota]:[]):(t.priceList&&t.priceList.length?t.priceList:t.priceStandard?[t.priceStandard]:[]);
  document.body.insertAdjacentHTML("beforeend",'<div style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px" onclick="if(event.target===this)this.remove()"><div style="background:#fff;border-radius:12px;max-width:580px;width:100%;max-height:84vh;overflow:auto;padding:20px 24px"><span style="float:right;cursor:pointer;font-size:20px;color:var(--muted)" onclick="this.closest(\'[style*=fixed]\').remove()">✕</span><h3 style="margin:0 0 8px">'+t.name+'</h3>'+(t.brand?'<span class="badge vendor">'+t.brand+'</span> ':'')+(t.country?'<span class="badge country">'+t.country+'</span> ':'')+'<span class="badge '+t.type+'">'+(t.type==="free"?"免费":"付费")+'</span><p style="color:var(--muted)">'+(t.description||"")+'</p>'+(fl.length?'<div class="ql"><b>'+(t.type==="free"?"🆓":"💎")+'</b><ul>'+fl.map(x=>'<li>'+x+'</li>').join("")+'</ul></div>':"")+'<p><b>⚠️</b> '+(t.limits||"—")+' | <b>评分</b> '+t.rating+'/5 | <b>性价比</b> '+t.valueScore+'/5</p>'+(t.expertise?'<p><b>详解</b> '+t.expertise+'</p>':"")+'<p><a class="btn btn-pri" href="'+t.url+'" target="_blank">前往官网 ↗</a></p></div></div>');
}

// ====== carousel ======
async function ln(){try{news=await(await fetch(API+"/api/site-news")).json();}catch(e){news=[];return;}if(!news.length)return;$("caro").classList.remove("hide");rn(false);setTimeout(()=>{if(news.length>1){ni=1;rn(true);nt=setInterval(()=>{ni=(ni+1)%news.length;rn(true)},8000)}},4000);}
function rn(a){let n=news[ni],ci=$("ci"),cf=$("cfb");if(n.image){cf.style.display="none";ci.style.display="";if(a){ci.classList.add("hiding");setTimeout(()=>{ci.src=n.image;ci.classList.remove("hiding")},300)}else ci.src=n.image}else{ci.style.display="none";cf.style.display="flex";cf.querySelector("span").textContent=n.title}$("cd").innerHTML=news.map((_,i)=>'<span class="'+(i===ni?"on":"")+'" onclick="gn('+i+')"></span>').join("");$("cl").innerHTML=news.map((it,i)=>'<li class="'+(i===ni?"on":"")+'" onclick="gn('+i+')"><a href="'+it.link+'" target="_blank">'+it.title+'</a><div style="font-size:12px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(it.summary||"")+'</div></li>').join("");}
function gn(x){ni=x;clearInterval(nt);rn(true);nt=setInterval(()=>{ni=(ni+1)%news.length;rn(true)},8000)}
function pv(){gn((ni-1+news.length)%news.length)}function nx(){gn((ni+1)%news.length)}

// ====== init ======
async function load(){try{let r=await fetch(API+"/api/tokens");ALL=await r.json();$("sideStat").textContent=ALL.length+" API"}catch(e){ALL=[]}$("tstat").innerHTML='<b style="color:var(--primary)">'+ALL.length+'</b> 个 API';buildNav();rf();}
ln();load();
</script>
