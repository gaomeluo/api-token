  $("toolNav").innerHTML=`<a data-tool="AI智能体" data-cat="" class="small${curTool==='AI智能体'?' active':''}"><span class="si">🤖</span><span>AI智能体</span><span class="n">30</span></a><a data-tool="AI编程工具" data-cat="" class="small${curTool==='AI编程工具'?' active':''}"><span class="si">💻</span><span>AI编程工具</span><span class="n">30</span></a>`;
}

// 图标两源：直连 favicon.ico → DDG兜底 → 首字母
let fixIconsRan=false;
function fixIcons(){
  if(fixIconsRan)return;fixIconsRan=true;
  setTimeout(()=>{
    document.querySelectorAll(".ti img,.ci img").forEach(img=>{
      if(!img.complete||img.naturalWidth===0||img.naturalWidth<2){
        const fb=img.nextElementSibling;
        if(!img.src||img.src.includes("data:")){if(fb)fb.style.display="flex";img.style.display="none";return;}
        try{var h=new URL(img.src).hostname;img.src="https://icons.duckduckgo.com/ip3/"+h+".ico";img.onerror=function(){if(fb)fb.style.display="flex";img.style.display="none";};}
        catch(e){if(fb)fb.style.display="flex";img.style.display="none";}
      }
    });fixIconsRan=false;
  },2000);
}
}

function pickCat(c){curCat=(curCat===c)?null:c;curTool=null;bs();rf();}
function pickTool(t){if(curTool===t)return;curTool=t;curCat=null;bs();rf();}
function swt(t){curType=t;document.querySelectorAll(".tbar-tab").forEach(e=>e.classList.toggle("active",e.dataset.type===t));rf();}

function getFav(u){try{return`https://${new URL(u).hostname}/favicon.ico`;}catch(e){return"";}}

function rf(){
  let list;
  if(curTool){
    list=TOOLS.filter(t=>t.c===curTool);
    $("sub").textContent=`${curTool} · ${list.length} 个工具`;
    $("tbar").style.display="none";$("q").parentElement.parentElement.style.display="none";
    $("list").innerHTML=`<div class="tool-grid">${list.map(t=>`<div class="tcard"><div class="ti"><img loading="lazy" src="${getFav(t.u)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><span class="fb" style="display:none">${t.n.charAt(0)}</span></div><div class="tb"><b>${t.n}</b><div class="td">${t.d}</div></div><a class="btn btn-pri" href="${t.u}" target="_blank">官网</a></div>`).join("")}</div>`;
    fixIcons();
    return;
  }
  $("tbar").style.display=curCat?"none":"";$("q").parentElement.parentElement.style.display="";
  if(curCat){
    const mp={"文本模型":["对话","长文本","翻译","中文"],"编程模型":["写代码"],"视频模型":["视频","视频生成","数字人","3D"],"音频模型":["语音","语音合成","TTS","语音识别","ASR","语音克隆","音乐"],"图片模型":["画图","图像生成","图像编辑","品牌设计","游戏资产","商用"],"推理模型":["推理","搜索","开源","高速","本地","embeddings"]};
    const kw=mp[curCat]||[];
    list=ALL.filter(t=>t.category===curCat||(t.tags||[]).some(tag=>kw.includes(tag)));
  }else{list=ALL.filter(t=>t.type===curType);}
  const q=($("q").value||"").trim().toLowerCase();
  if(q)list=list.filter(t=>(t.name||"").toLowerCase().includes(q)||(t.tags||[]).join(",").toLowerCase().includes(q));
  $("tbs").innerHTML=`<b style="color:var(--primary)">${ALL.length}</b> 个 API · ${curCat?curCat:(curType==="free"?"免费榜":"付费榜")}`;
  $("sub").textContent=`共 ${list.length} 个`;
  if(!list.length){$("list").innerHTML='<div style="color:var(--muted);text-align:center;padding:40px">该分类下暂无 token</div>';return;}
  $("list").innerHTML=`<div class="grid">${list.map(t=>{const fl=t.type==="free"?(t.freeQuotaList&&t.freeQuotaList.length?t.freeQuotaList:t.freeQuota?[t.freeQuota]:[]):(t.priceList&&t.priceList.length?t.priceList:t.priceStandard?[t.priceStandard]:[]);return`<div class="card"><div class="ci"><img loading="lazy" src="${getFav(t.url||'')}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><span class="fb" style="display:none">${(t.name||"?").trim().charAt(0)}</span></div><div class="cb"><div class="cn">${t.name}<span class="badge ${t.type}">${t.type==="free"?"免费":"付费"}</span>${t.brand?`<span class="badge vendor">${t.brand}</span>`:""}${t.country?`<span class="badge country">${t.country}</span>`:""}</div><div class="ct">${(t.tags||[]).slice(0,5).map(x=>`<span class="chip">${x}</span>`).join("")}</div><div class="cd">${t.description||""}</div>${fl.length?`<div class="ql"><b>${t.type==="free"?"🆓 免费额度":"💎 付费详情"}</b><ul>${fl.slice(0,2).map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}<div class="cf"><button class="btn btn-pri" onclick="det('${t.id}')">详情</button><a class="btn btn-ghost" href="${t.url}" target="_blank">前往 ↗</a></div></div></div>`}).join("")}</div>`;fixIcons();
}

function det(id){
  const t=ALL.find(x=>x.id===id);if(!t)return;
  const fl=t.type==="free"?(t.freeQuotaList&&t.freeQuotaList.length?t.freeQuotaList:t.freeQuota?[t.freeQuota]:[]):(t.priceList&&t.priceList.length?t.priceList:t.priceStandard?[t.priceStandard]:[]);
  document.body.insertAdjacentHTML("beforeend",`<div style="position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px" onclick="if(event.target===this)this.remove()"><div style="background:#fff;border-radius:14px;max-width:620px;width:100%;max-height:86vh;overflow:auto;padding:22px 26px"><span style="float:right;cursor:pointer;font-size:20px;color:var(--muted)" onclick="this.closest('[style*=fixed]').remove()">✕</span><h3 style="margin:0 0 12px">${t.name}</h3>${t.brand?`<span class="badge vendor">${t.brand}</span>`:""}${t.country?`<span class="badge country">${t.country}</span>`:""}<span class="badge ${t.type}">${t.type==="free"?"免费":"付费"}</span><p style="color:var(--muted)">${t.description||""}</p>${fl.length?`<div class="ql"><b>${t.type==="free"?"🆓":"💎"}</b><ul>${fl.map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}<p><b>⚠️ 限制：</b>${t.limits||"—"}</p><p><b>评分：</b>${t.rating}/5 ｜ <b>性价比：</b>${t.valueScore}/5</p>${t.expertise?`<p><b>详解：</b>${t.expertise}</p>`:""}<p><a class="btn btn-pri" href="${t.url}" target="_blank">前往官网 ↗</a></p></div></div>`);
}

// 轮播（独立于 render，只更新轮播内部元素）
async function ln(){try{news=await(await fetch(API+"/api/site-news")).json();}catch(e){news=[];return;}if(!news.length)return;$("ns").classList.remove("hide");rn(false);setTimeout(()=>{if(news.length>1){ni=1%news.length;rn(true);nt=setInterval(()=>{ni=(ni+1)%news.length;rn(true);},8000);}},4000);}
function rn(a){const n=news[ni],i=$("fi"),f=$("ff");if(n.image){f.style.display="none";i.style.display="";if(a){i.classList.add("hiding");setTimeout(()=>{i.src=n.image;i.classList.remove("hiding");},350);}else i.src=n.image;}else{i.style.display="none";f.style.display="flex";f.querySelector("span").textContent=n.title;}$("fd").innerHTML=news.map((_,x)=>`<span class="${x===ni?'active':''}" onclick="gn(${x})"></span>`).join("");$("fl").innerHTML=news.map((it,x)=>`<li class="${x===ni?'on':''}" onclick="gn(${x})"><a href="${it.link}" target="_blank">${it.title}<span class="f-badge">推荐</span></a><div class="s">${it.summary||""}</div></li>`).join("");}
function gn(x){ni=x;clearInterval(nt);rn(true);nt=setInterval(()=>{ni=(ni+1)%news.length;rn(true);},8000);}
function pv(){gn((ni-1+news.length)%news.length);}
function nx(){gn((ni+1)%news.length);}

ln();load();
</script>
