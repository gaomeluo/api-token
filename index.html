<script>

const KW={"文本模型":["对话","长文本","翻译","中文"],"编程模型":["写代码"],"视频模型":["视频","视频生成","数字人","3D"],"音频模型":["语音","TTS","语音识别","ASR","语音克隆","音乐"],"图片模型":["画图","图像生成","图像编辑","品牌设计","游戏资产","商用"],"推理模型":["推理","搜索","开源","高速","本地","embeddings"]};

let ALL=[],curType="free",curCat=null,curTool=null,news=[],ni=0,caroTimer=null;

function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}

/* ---- local letter-avatar: zero network requests, instant on mobile ---- */
const PAL=["#1677ff","#2979ff","#7c3aed","#db2777","#ea580c","#059669","#0891b2","#d97706","#dc2626","#4f46e5","#0d9488","#9333ea"];
function hsh(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function avatar(name){
  const ch=(name||"?").trim().charAt(0).toUpperCase();
  const c=PAL[hsh(name||"?")%PAL.length];
  const svg="<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='"+c+"'/><text x='32' y='34' text-anchor='middle' dominant-baseline='central' font-size='34' font-family='PingFang SC,Microsoft YaHei,sans-serif' fill='#fff' font-weight='700'>"+esc(ch)+"</text></svg>";
  return "data:image/svg+xml,"+encodeURIComponent(svg);
}

/* ---- brand logo: built-in localized favicons (zero runtime network for known brands),
   runtime auto-fetch for NEW brands added in admin, letter-avatar as final fallback ---- */
function hostOf(u){try{return new URL(u).hostname;}catch(e){return "";}}
function normHost(d){d=(d||"");while(d.indexOf("www.")===0)d=d.slice(4);return d;}
function logo(domain){domain=normHost(domain);return (window.__LOGOS__&&window.__LOGOS__[domain])||null;}

/* runtime-resolved logos for brands missing from logos.js (e.g. added later in admin).
   Persisted to localStorage so repeat visits are instant; letter-avatar is the fallback. */
const _LSLOGO="apitk_rtlogos_v1";
const _rtResolved={};
try{Object.assign(_rtResolved,JSON.parse(localStorage.getItem(_LSLOGO)||"{}"));}catch(e){}
function _saveRt(){try{localStorage.setItem(_LSLOGO,JSON.stringify(_rtResolved));}catch(e){}}
const _rtPending={},_rtFailed={};
function brandImg(name,url){
  const h=normHost(hostOf(url));
  if(h&&logo(h))return logo(h);
  if(h&&_rtResolved[h])return _rtResolved[h];
  return avatar(name);
}
function resolveLogos(){
  const imgs=document.querySelectorAll("img.brand-ico");
  for(let i=0;i<imgs.length;i++){
    const im=imgs[i];
    const h=im.getAttribute("data-host");
    if(!h||logo(h)||_rtResolved[h]||_rtFailed[h]||_rtPending[h])continue;
    _rtPending[h]=true;
    (function(domain){
      const sources=["https://icons.duckduckgo.com/ip3/"+domain+".ico","https://favicon.im/"+domain];
      let idx=0;
      (function tryNext(){
        if(idx>=sources.length){_rtFailed[domain]=true;_rtPending[domain]=false;return;}
        const u=sources[idx++];
        const probe=new Image();
        probe.onload=function(){
          _rtResolved[domain]=u;_saveRt();_rtPending[domain]=false;
          const live=document.querySelector('img.brand-ico[data-host="'+domain+'"]');
          if(live)live.src=u;
        };
        probe.onerror=tryNext;
        probe.src=u;
      })();
    })(h);
  }
}

/* ---- cache helpers (instant paint + offline) ---- */
function rc(k){try{const v=JSON.parse(localStorage.getItem(k));return v&&v.d?v.d:null;}catch(e){return null;}}
function wc(k,d){try{localStorage.setItem(k,JSON.stringify({t:Date.now(),d}));}catch(e){}}

/* ---- fetch with timeout (no more hanging blank page) ---- */
async function getJSON(url,ms){
  const ctrl=new AbortController();
  const to=setTimeout(function(){ctrl.abort();},ms);
  try{const r=await fetch(url,{signal:ctrl.signal,cache:"no-store"});if(!r.ok)throw new Error("http "+r.status);return await r.json();}
  finally{clearTimeout(to);}
}

  let list;
  if(curCat){
    let kw=KW[curCat]||[];
    list=ALL.filter(function(t){return t.category===curCat||(t.tags||[]).some(function(tg){return kw.includes(tg);});});
  }else{list=ALL.filter(function(t){return t.type===curType;});}
  $("tstat").innerHTML='<b style="color:var(--primary)">'+ALL.length+'</b> 个 API · '+(curCat||(curType==="free"?"免费榜":"付费榜"));
  $("sub").textContent="";
  if(!list.length){$("list").innerHTML='<div style="color:var(--muted);text-align:center;padding:40px">暂无</div>';return;}
  $("list").innerHTML='<div class="grid">'+list.map(function(t){
    let fl=quotaList(t);
    return'<div class="card"><div class="ico"><img class="brand-ico" data-host="'+esc(normHost(hostOf(t.url)))+'" src="'+brandImg(t.name,t.url)+'" alt="" loading="lazy"></div><div class="cb"><div class="cn">'+esc(t.name)+'<span class="badge '+t.type+'">'+(t.type==="free"?"免费":"付费")+'</span>'+(t.brand?'<span class="badge vendor">'+esc(t.brand)+'</span>':'')+(t.country?'<span class="badge country">'+esc(t.country)+'</span>':'')+'</div><div class="ct">'+(t.tags||[]).slice(0,5).map(function(x){return '<span class="chip">'+esc(x)+'</span>';}).join("")+'</div><div class="cd">'+(t.description||"")+'</div>'+(fl.length?'<div class="ql"><b>'+(t.type==="free"?"🆓":"💎")+'</b><ul>'+fl.slice(0,2).map(function(x){return '<li>'+esc(x)+'</li>';}).join("")+'</ul></div>':"")+'<div class="cf"><button class="btn btn-pri" data-detail="'+esc(t.id)+'">详情</button><a class="btn btn-ghost" href="'+esc(t.url)+'" target="_blank" rel="noopener">前往 ↗</a></div></div></div>';
  }).join("")+'</div>';
  resolveLogos();
}
function det(id){
  let t=ALL.find(function(x){return x.id===id;});if(!t)return;
  let fl=quotaList(t);
  document.body.insertAdjacentHTML("beforeend",'<div class="modal" style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px" onclick="if(event.target===this)this.remove()"><div style="background:#fff;border-radius:12px;max-width:580px;width:100%;max-height:84vh;overflow:auto;padding:20px 24px"><span style="float:right;cursor:pointer;font-size:20px;color:var(--muted)" onclick="this.closest(\'.modal\').remove()">✕</span><h3 style="margin:0 0 8px">'+esc(t.name)+'</h3>'+(t.brand?'<span class="badge vendor">'+esc(t.brand)+'</span> ':'')+(t.country?'<span class="badge country">'+esc(t.country)+'</span> ':'')+'<span class="badge '+t.type+'">'+(t.type==="free"?"免费":"付费")+'</span><p style="color:var(--muted)">'+(t.description||"")+'</p>'+(fl.length?'<div class="ql"><b>'+(t.type==="free"?"🆓":"💎")+'</b><ul>'+fl.map(function(x){return '<li>'+esc(x)+'</li>';}).join("")+'</ul></div>':"")+'<p><b>⚠️</b> '+(t.limits||"—")+' | <b>评分</b> '+t.rating+'/5 | <b>性价比</b> '+t.valueScore+'/5</p>'+(t.expertise?'<p><b>详解</b> '+esc(t.expertise)+'</p>':"")+'<p><a class="btn btn-pri" href="'+esc(t.url)+'" target="_blank" rel="noopener">前往官网 ↗</a></p></div></div>');
}
/* event delegation for 详情 (avoids inline-handler quoting bugs) */
$("list").addEventListener("click",function(e){const b=e.target.closest("[data-detail]");if(b)det(b.getAttribute("data-detail"));});

/* ---- carousel ---- */
function renderCaro(){
  let n=news[ni],ci=$("ci"),cf=$("cfb");
  if(n.image){cf.style.display="none";ci.style.display="";ci.classList.remove("ready");ci.src=n.image;ci.onload=function(){ci.classList.add("ready");};}
  else{ci.style.display="none";cf.style.display="flex";cf.querySelector("span").textContent=n.title;}
  $("cd").innerHTML=news.map(function(_,i){return '<span class="'+(i===ni?"on":"")+'" onclick="gn('+i+')"></span>';}).join("");
  $("cl").innerHTML=news.map(function(it,i){
    return '<li class="'+(i===ni?"on":"")+'" onclick="gn('+i+')"><a href="'+esc(it.link)+'" target="_blank" rel="noopener">'+esc(it.title)+' <span style="background:#f59e0b;color:#fff;font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600">推荐</span></a><div style="font-size:12px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(it.summary||"")+'</div></li>';
  }).join("");
}
function initCaro(){
  if(!news.length)return;
  $("caro").classList.remove("hide");
  if(caroTimer)clearInterval(caroTimer);
  ni=0;renderCaro();
  if(news.length>1)caroTimer=setInterval(function(){ni=(ni+1)%news.length;renderCaro();},8000);
}
function gn(x){ni=x;clearInterval(caroTimer);renderCaro();if(news.length>1)caroTimer=setInterval(function(){ni=(ni+1)%news.length;renderCaro();},8000);}
function pv(){gn((ni-1+news.length)%news.length);}function nx(){gn((ni+1)%news.length);}

/* ---- data load (resilient: cache -> live -> snapshot -> error) ---- */
async function load(){
  const cached=rc(CACHE_KEY);
  if(cached&&cached.length){ALL=cached;buildNav();rf();}
  else{showSkeleton();}
  let live=null;
  try{live=await getJSON(API+"/api/tokens",8000);}catch(e){live=null;}
  if(live&&live.length){ALL=live;wc(CACHE_KEY,live);buildNav();rf();$("tstat").innerHTML='<b style="color:var(--primary)">'+ALL.length+'</b> 个 API';return;}
  /* live failed -> fallback to static snapshot */
  if(window.__TOKENS__&&window.__TOKENS__.length){
    if(!(cached&&cached.length)){ALL=window.__TOKENS__;buildNav();rf();}
    $("tstat").innerHTML='<b style="color:var(--primary)">'+ALL.length+'</b> 个 API';
    showPill("当前展示离线快照数据");
    return;
  }
  if(!(cached&&cached.length))showError();
}
async function ln(){
  const snap=window.__NEWS__||[];
  if(snap.length&&!news.length){news=snap;initCaro();}
  try{const nd=await getJSON(API+"/api/site-news",8000);if(nd&&nd.length){news=nd;wc(NEWS_KEY,nd);initCaro();}}catch(e){}
}

/* ---- init ---- */
$("cpy").textContent=new Date().getFullYear();
ln();
load();

/* service worker for instant repeat loads / offline */
if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("./sw-app.js").catch(function(){});});}
</script>
